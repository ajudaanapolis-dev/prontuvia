name: prontuvia-2

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pep
      POSTGRES_USER: pep_owner
      POSTGRES_PASSWORD: pep_owner_change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pep_owner -d pep"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pep_local
      MINIO_ROOT_PASSWORD: replace-this-local-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  medplum-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medplum
      POSTGRES_USER: medplum
      POSTGRES_PASSWORD: ${MEDPLUM_DATABASE_PASSWORD:-medplum_local_change_me}
    ports:
      - "5433:5432"
    volumes:
      - medplum_postgres_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "statement_timeout=60000", "-c", "default_transaction_isolation=REPEATABLE READ"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medplum -d medplum"]
      interval: 5s
      timeout: 5s
      retries: 30

  medplum-redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${MEDPLUM_REDIS_PASSWORD:-medplum_local_change_me}"]
    ports:
      - "6380:6379"
    volumes:
      - medplum_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${MEDPLUM_REDIS_PASSWORD:-medplum_local_change_me} ping"]
      interval: 5s
      timeout: 5s
      retries: 30

  medplum-server:
    image: medplum/medplum-server:${MEDPLUM_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      medplum-postgres:
        condition: service_healthy
      medplum-redis:
        condition: service_healthy
    ports:
      - "8103:8103"
    command: ["env"]
    environment:
      MEDPLUM_PORT: 8103
      MEDPLUM_BASE_URL: http://localhost:8103/
      MEDPLUM_APP_BASE_URL: http://localhost:3000/
      MEDPLUM_STORAGE_BASE_URL: http://localhost:8103/storage/
      MEDPLUM_DATABASE_HOST: medplum-postgres
      MEDPLUM_DATABASE_PORT: 5432
      MEDPLUM_DATABASE_DBNAME: medplum
      MEDPLUM_DATABASE_USERNAME: medplum
      MEDPLUM_DATABASE_PASSWORD: ${MEDPLUM_DATABASE_PASSWORD:-medplum_local_change_me}
      MEDPLUM_REDIS_HOST: medplum-redis
      MEDPLUM_REDIS_PORT: 6379
      MEDPLUM_REDIS_PASSWORD: ${MEDPLUM_REDIS_PASSWORD:-medplum_local_change_me}
      MEDPLUM_BINARY_STORAGE: file:./binary/
      MEDPLUM_SUPPORT_EMAIL: '"Prontuvia" <suporte@prontuvia.local>'
      MEDPLUM_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5174,http://localhost:5173
      MEDPLUM_INTROSPECTION_ENABLED: "true"
      MEDPLUM_VM_CONTEXT_BOTS_ENABLED: "true"
      MEDPLUM_DEFAULT_BOT_RUNTIME_VERSION: vmcontext
      MEDPLUM_MAX_JSON_SIZE: 2mb
      MEDPLUM_MAX_BATCH_SIZE: 50mb
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8103/healthcheck').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      start_period: 30m
      interval: 15s
      timeout: 10s
      retries: 60

  medplum-console:
    image: medplum/medplum-app:${MEDPLUM_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      medplum-server:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  medplum_postgres_data:
  medplum_redis_data:
